<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0975F9" />
    <meta content='yes' name='apple-mobile-web-app-capable'/>
    <meta content='yes' name='mobile-web-app-capable'/>

    <link rel="icon" href="./img/icone-azul512x512.png" type="image/png">
    <link rel="manifest" href="manifest.json">
    
    <link rel="stylesheet" href="./styles/root.css">
    <link rel="stylesheet" href="./styles/index.css">
    <link rel="stylesheet" href="./styles/audio.css">
    
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <title>Aprenda Pomerano</title>
</head>

<body>
    <!-- TELA PRINCIPAL -->
    <div id="main-view" class="view active">
        <header class="app-header">
            <div>
                <h1 id="page-title">Aprenda Pomerano</h1>
                <p class="subtitle">Selecione uma categoria</p>
            </div>
            <button id="info-app" class="icon-btn" aria-label="Sobre o app">
                <span class="material-icons-round">info</span>
            </button>
        </header>
        
        <main id="elements-content" class="elements-grid">
            <!-- Inserido via JS -->
        </main>
    </div>

    <!-- TELA DE ÁUDIOS (MODAL) -->
    <div id="audio-modal" class="view modal">
        <header class="app-header">
            <button id="back-arrow" class="icon-btn" aria-label="Voltar">
                <span class="material-icons-round">arrow_back</span>
            </button>
            <h1 class="modal-title">Aprenda Pomerano</h1>
        </header>
        
        <div class="audios-content">
            <!-- Inserido via JS -->
        </div>
    </div>

    <!-- TELA SOBRE O APP (MODAL) -->
    <div id="info-modal" class="view modal">
        <header class="app-header">
            <button id="back-arrow-info" class="icon-btn" aria-label="Voltar">
                <span class="material-icons-round">arrow_back</span>
            </button>
            <h1 class="modal-title">Sobre o aplicativo</h1>
        </header>
        <object title="sobre" data="./sobre.html" type="text/html" class="info-object"></object>
    </div>

    <script src="./scripts/index.js"></script>
    <script>
    // Gerenciamento do Toast na UI
    const toastContainer = document.getElementById('toast-container');
    const toastMessage = document.getElementById('toast-message');
    const toastProgress = document.getElementById('toast-progress');
    const toastIcon = document.getElementById('toast-icon');
    let hideToastTimeout;

    function showToast(message, percent = 0, isComplete = false) {
        toastContainer.classList.add('toast-visible');
        toastMessage.textContent = message;
        toastProgress.style.width = `${percent}%`;
        
        if (isComplete) {
            toastIcon.textContent = 'check_circle';
            toastIcon.classList.remove('spin');
            toastProgress.style.background = 'var(--color-success, #41f1b6)';
            
            // Esconde automaticamente após 3 segundos
            clearTimeout(hideToastTimeout);
            hideToastTimeout = setTimeout(() => {
                toastContainer.classList.remove('toast-visible');
            }, 3000);
        } else {
            toastIcon.textContent = 'sync';
            toastIcon.classList.add('spin');
        }
    }

    if ('serviceWorker' in navigator) {
        // 1. Ouve as mensagens do Service Worker (Progresso do Download)
        navigator.serviceWorker.addEventListener('message', event => {
            if (event.data.type === 'DOWNLOAD_PROGRESS') {
                const percent = (event.data.baixados / event.data.total) * 100;
                showToast(`Baixando áudios offline (${event.data.baixados}/${event.data.total})`, percent);
            } else if (event.data.type === 'DOWNLOAD_COMPLETE') {
                showToast('Todos os áudios prontos para uso offline!', 100, true);
            }
        });

        // 2. ATUALIZAÇÃO AUTOMÁTICA (O fim do Ctrl+Shift+R)
        // Quando um novo sw.js é instalado, a página recarrega sozinha para exibir o layout novo
        let isRefreshing = false;
        navigator.serviceWorker.addEventListener('controllerchange', () => {
            if (!isRefreshing) {
                isRefreshing = true;
                showToast('Aplicando nova atualização...', 100);
                setTimeout(() => window.location.reload(), 1000); // Dá 1 segundo pra pessoa ler a mensagem
            }
        });

        // 3. Registra o SW
        navigator.serviceWorker.register('./sw.js')
            .then(() => console.log('Service Worker Registrado e pronto!'))
            .catch((err) => console.warn('Falha no Service Worker', err));
    }
</script>
</body>
<!-- Toast de Notificações Fixado no Rodapé -->
<div id="toast-container" class="toast-hidden">
    <div class="toast-content">
        <span class="material-icons-round" id="toast-icon">downloading</span>
        <div class="toast-text-area">
            <p id="toast-message">Preparando áudios offline...</p>
            <div class="progress-bg">
                <div id="toast-progress" class="progress-fill"></div>
            </div>
        </div>
    </div>
</div>
</html>
